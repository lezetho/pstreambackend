[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs-22_x", "python3", "gcc", "gnumake"]

[phases.install]
commands = [
  "npm install"
]

[phases.build]
commands = [
    "npx prisma generate",
  "npx prisma migrate deploy",
  "npm run build"
]

[start]
cmd = "source .env && node .output/server/index.mjs"
